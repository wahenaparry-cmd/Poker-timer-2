<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1e; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .clock-wrap { background: #1a1a2e; border-radius: 16px; padding: 1.5rem; color: #fff; width: 100%; max-width: 500px; height: fit-content; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .title { font-size: 13px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .tables-selector { display: flex; gap: 6px; }
  .tbl-btn { background: #2a2a4a; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .tbl-btn.active { background: #c8a44a; border-color: #c8a44a; color: #1a1a2e; font-weight: 600; }
  .main-display { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
  .blind-card { background: #0d0d1a; border-radius: 10px; padding: 1rem 1.2rem; text-align: center; }
  .blind-label { font-size: 11px; color: #777; letter-spacing: 1px; margin-bottom: 0.3rem; text-transform: uppercase; }
  .blind-value { font-size: 28px; font-weight: 600; color: #c8a44a; }
  .timer-section { text-align: center; margin-bottom: 1.2rem; }
  .level-badge { display: inline-block; background: #c8a44a; color: #1a1a2e; font-size: 12px; font-weight: 600; padding: 2px 12px; border-radius: 20px; margin-bottom: 0.5rem; }
  .timer-display { font-size: 72px; font-weight: 600; color: #fff; letter-spacing: 2px; line-height: 1; font-variant-numeric: tabular-nums; }
  .timer-display.warning { color: #e87c3a; }
  .timer-display.danger { color: #e84a3a; }
  .progress-bar { height: 4px; background: #2a2a4a; border-radius: 2px; margin: 0.6rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #c8a44a; border-radius: 2px; transition: width .5s; }
  .next-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.2rem; }
  .next-card { background: #0d0d1a; border-radius: 8px; padding: 0.7rem 1rem; }
  .next-label { font-size: 11px; color: #666; margin-bottom: 3px; text-transform: uppercase; }
  .next-val { font-size: 16px; color: #aaa; font-weight: 600; }
  .controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .ctrl-btn { background: #2a2a4a; border: 1px solid #444; color: #ccc; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s; }
  .ctrl-btn:hover { background: #3a3a5a; }
  .ctrl-btn.primary { background: #c8a44a; border-color: #c8a44a; color: #1a1a2e; font-weight: 600; }
  .ctrl-btn.primary:hover { background: #d4b55c; }
  .ctrl-btn.danger { border-color: #e84a3a; color: #e84a3a; }
  .ctrl-btn.danger:hover { background: #2a1515; }
  .ctrl-btn.edit-dur { border-color: #5a8a6a; color: #7abf8a; }
  .ctrl-btn.edit-dur:hover, .ctrl-btn.edit-dur.active { background: #1a3a2a; border-color: #7abf8a; color: #7abf8a; }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666; margin-bottom: 0.8rem; }
  .struct-wrapper { overflow-y: auto; max-height: 200px; border-radius: 8px; border: 1px solid #2a2a4a; }
  .structure-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .structure-table th { color: #888; font-weight: 500; padding: 5px 8px; text-align: center; border-bottom: 1px solid #2a2a4a; position: sticky; top: 0; background: #1a1a2e; }
  .structure-table td { padding: 4px 6px; text-align: center; color: #bbb; border-bottom: 1px solid #141426; }
  .structure-table tr.current-row td { background: #c8a44a22; color: #c8a44a; font-weight: 600; }
  .structure-table tr.pause-row td { background: #3a2a1a; color: #c8843a; font-style: italic; }
  .dur-input { background: #1a1a2e; border: 1px solid #5a8a6a; color: #7abf8a; width: 44px; padding: 2px 4px; border-radius: 4px; font-size: 12px; text-align: center; font-family: inherit; }
  .dur-input:focus { outline: none; border-color: #7abf8a; }
  .edit-panel { background: #0d1a12; border-radius: 8px; border: 1px solid #2a3a2a; margin-bottom: 0.8rem; padding: 10px 12px; }
  .edit-panel-title { font-size: 12px; color: #7abf8a; font-weight: 600; margin-bottom: 8px; }
  .panel-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .panel-row label { font-size: 11px; color: #888; white-space: nowrap; }
  .panel-row input[type=number] { background: #1a2a1a; border: 1px solid #5a8a6a; color: #7abf8a; width: 54px; padding: 3px 5px; border-radius: 4px; font-size: 11px; text-align: center; font-family: inherit; }
  .panel-row input[type=number]:focus { outline: none; }
  .panel-btn { padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; background: #1a3a2a; border: 1px solid #7abf8a; color: #7abf8a; }
  .panel-btn:hover { background: #1e4a30; }
  .edit-hint { font-size: 11px; color: #5a8a6a; text-align: center; padding: 4px 0 2px; }
</style>
</head>
<body>
<div class="clock-wrap">
  <div class="top-bar">
    <div>
      <div class="title">Poker Timer</div>
      <div style="font-size:11px;color:#666;margin-top:2px;">15 000 jetons de départ</div>
    </div>
    <div>
      <div style="font-size:11px;color:#666;margin-bottom:4px;text-align:right;">Nombre de tables</div>
      <div class="tables-selector">
        <button class="tbl-btn active" onclick="setTables(1)">1</button>
        <button class="tbl-btn" onclick="setTables(2)">2</button>
        <button class="tbl-btn" onclick="setTables(3)">3</button>
        <button class="tbl-btn" onclick="setTables(4)">4</button>
      </div>
    </div>
  </div>

  <div class="main-display">
    <div class="blind-card">
      <div class="blind-label">Petite blinde</div>
      <div class="blind-value" id="sb-val">25</div>
    </div>
    <div class="blind-card">
      <div class="blind-label">Grande blinde</div>
      <div class="blind-value" id="bb-val">50</div>
    </div>
  </div>

  <div class="timer-section">
    <div class="level-badge" id="level-badge">Niveau 1</div>
    <div class="timer-display" id="timer">12:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:100%"></div></div>
    <div class="info-row">
      <span id="elapsed-info">0:00 écoulé</span>
      <span id="duration-info">Durée : 12 min</span>
    </div>
  </div>

  <div class="next-row">
    <div class="next-card">
      <div class="next-label">Prochain niveau</div>
      <div class="next-val" id="next-blinds">50 / 100</div>
    </div>
    <div class="next-card">
      <div class="next-label">Durée prochaine</div>
      <div class="next-val" id="next-dur">12 min</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevLevel()">◀ Préc.</button>
    <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">▶ Démarrer</button>
    <button class="ctrl-btn" onclick="nextLevel()">Suiv. ▶</button>
    <button class="ctrl-btn danger" onclick="resetTimer()">↺</button>
    <button class="ctrl-btn edit-dur" id="edit-btn" onclick="toggleEdit()">✎ Modifier durées</button>
  </div>

  <div id="edit-panel" style="display:none;" class="edit-panel">
    <div class="edit-panel-title">Modifier les durées (minutes)</div>
    <div class="panel-row">
      <label>Tous :</label>
      <input type="number" id="all-dur" min="1" max="120" value="12" step="1">
      <button class="panel-btn" onclick="applyDur('all')">Appliquer</button>
      <label style="margin-left:8px;">Avant pause :</label>
      <input type="number" id="pre-dur" min="1" max="120" value="12" step="1">
      <button class="panel-btn" onclick="applyDur('pre')">Appliquer</button>
      <label style="margin-left:8px;">Après pause :</label>
      <input type="number" id="post-dur" min="1" max="120" value="11" step="1">
      <button class="panel-btn" onclick="applyDur('post')">Appliquer</button>
    </div>
    <div class="edit-hint">Ou modifiez chaque niveau individuellement dans le tableau</div>
  </div>

  <div class="struct-wrapper">
    <table class="structure-table">
      <thead>
        <tr>
          <th>Niv.</th>
          <th>SB</th>
          <th>BB</th>
          <th>Durée</th>
        </tr>
      </thead>
      <tbody id="struct-body"></tbody>
    </table>
  </div>
</div>

<script>
const BASE = {
  1: [
    {level:1,sb:25,bb:50,dur:12},{level:2,sb:50,bb:100,dur:12},{level:3,sb:100,bb:200,dur:12},
    {level:4,sb:150,bb:300,dur:12},{level:5,sb:200,bb:400,dur:12},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:6,sb:250,bb:500,dur:12},{level:7,sb:300,bb:600,dur:12},{level:8,sb:400,bb:800,dur:12},
    {level:9,sb:500,bb:1000,dur:11},{level:10,sb:600,bb:1200,dur:11},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:11,sb:800,bb:1600,dur:11},{level:12,sb:1000,bb:2000,dur:11},{level:13,sb:1500,bb:3000,dur:11},{level:14,sb:2000,bb:4000,dur:11},
    {level:15,sb:3000,bb:6000,dur:11},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:16,sb:4000,bb:8000,dur:11},{level:17,sb:5000,bb:10000,dur:11},
    {level:18,sb:6000,bb:12000,dur:11},{level:19,sb:8000,bb:16000,dur:11},{level:20,sb:10000,bb:20000,dur:11},
    {level:21,sb:15000,bb:30000,dur:11},{level:22,sb:20000,bb:40000,dur:11},{level:23,sb:30000,bb:60000,dur:11}
  ],
  2: [
    {level:1,sb:25,bb:50,dur:12},{level:2,sb:50,bb:100,dur:12},{level:3,sb:100,bb:200,dur:12},
    {level:4,sb:150,bb:300,dur:12},{level:5,sb:200,bb:400,dur:12},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:6,sb:250,bb:500,dur:12},{level:7,sb:300,bb:600,dur:12},{level:8,sb:400,bb:800,dur:12},
    {level:9,sb:500,bb:1000,dur:8},{level:10,sb:600,bb:1200,dur:8},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:11,sb:800,bb:1600,dur:8},{level:12,sb:1000,bb:2000,dur:8},{level:13,sb:1500,bb:3000,dur:8},{level:14,sb:2000,bb:4000,dur:8},
    {level:15,sb:3000,bb:6000,dur:8},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:16,sb:4000,bb:8000,dur:8},{level:17,sb:5000,bb:10000,dur:8},
    {level:18,sb:6000,bb:12000,dur:8},{level:19,sb:8000,bb:16000,dur:8},{level:20,sb:10000,bb:20000,dur:8},
    {level:21,sb:15000,bb:30000,dur:8},{level:22,sb:20000,bb:40000,dur:8},{level:23,sb:30000,bb:60000,dur:8}
  ],
  3: [
    {level:1,sb:25,bb:50,dur:12},{level:2,sb:50,bb:100,dur:12},{level:3,sb:100,bb:200,dur:12},
    {level:4,sb:150,bb:300,dur:12},{level:5,sb:200,bb:400,dur:12},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:6,sb:250,bb:500,dur:12},{level:7,sb:300,bb:600,dur:12},{level:8,sb:400,bb:800,dur:12},
    {level:9,sb:500,bb:1000,dur:8},{level:10,sb:600,bb:1200,dur:8},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:11,sb:800,bb:1600,dur:8},{level:12,sb:1000,bb:2000,dur:8},{level:13,sb:1500,bb:3000,dur:8},{level:14,sb:2000,bb:4000,dur:8},
    {level:15,sb:3000,bb:6000,dur:8},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:16,sb:4000,bb:8000,dur:8},{level:17,sb:5000,bb:10000,dur:8},
    {level:18,sb:6000,bb:12000,dur:8},{level:19,sb:8000,bb:16000,dur:8},{level:20,sb:10000,bb:20000,dur:8},
    {level:21,sb:15000,bb:30000,dur:8},{level:22,sb:20000,bb:40000,dur:8},{level:23,sb:30000,bb:60000,dur:8}
  ],
  4: [
    {level:1,sb:25,bb:50,dur:12},{level:2,sb:50,bb:100,dur:12},{level:3,sb:100,bb:200,dur:12},
    {level:4,sb:150,bb:300,dur:12},{level:5,sb:200,bb:400,dur:12},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:6,sb:250,bb:500,dur:12},{level:7,sb:300,bb:600,dur:12},{level:8,sb:400,bb:800,dur:12},
    {level:9,sb:500,bb:1000,dur:7},{level:10,sb:600,bb:1200,dur:7},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:11,sb:800,bb:1600,dur:7},{level:12,sb:1000,bb:2000,dur:7},{level:13,sb:1500,bb:3000,dur:7},{level:14,sb:2000,bb:4000,dur:7},
    {level:15,sb:3000,bb:6000,dur:7},
    {level:'PAUSE',sb:null,bb:null,dur:20,isPause:true},
    {level:16,sb:4000,bb:8000,dur:7},{level:17,sb:5000,bb:10000,dur:7},
    {level:18,sb:6000,bb:12000,dur:7},{level:19,sb:8000,bb:16000,dur:7},{level:20,sb:10000,bb:20000,dur:7},
    {level:21,sb:15000,bb:30000,dur:7},{level:22,sb:20000,bb:40000,dur:7},{level:23,sb:30000,bb:60000,dur:7}
  ]
};

let STRUCTURES = JSON.parse(JSON.stringify(BASE));
let tables=1, currentIdx=0, secsLeft=0, totalSecs=0, isRunning=false, intervalId=null, editMode=false;

function fmt(n) { return n>=1000 ? (n/1000).toFixed(0)+'k' : n; }
function fmtTime(s) { const m=Math.floor(s/60),sec=s%60; return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
function getStruct() { return STRUCTURES[tables]; }
function getEntry(i) { return getStruct()[i]; }

function setTables(n) {
  tables=n;
  document.querySelectorAll('.tbl-btn').forEach((b,i)=>b.classList.toggle('active',i===n-1));
  if(isRunning) stopTimer();
  loadLevel(currentIdx); renderTable();
}

function loadLevel(idx) {
  const s=getStruct();
  if(idx<0||idx>=s.length) return;
  currentIdx=idx;
  const e=s[idx];
  totalSecs=e.dur*60; secsLeft=totalSecs;
  updateDisplay();
}

function updateDisplay() {
  const e=getEntry(currentIdx), s=getStruct();
  if(e.isPause) {
    document.getElementById('sb-val').textContent='PAUSE';
    document.getElementById('bb-val').textContent=e.dur+' min';
    document.getElementById('level-badge').textContent='Pause';
  } else {
    document.getElementById('sb-val').textContent=fmt(e.sb);
    document.getElementById('bb-val').textContent=fmt(e.bb);
    document.getElementById('level-badge').textContent='Niveau '+e.level;
  }
  const td=document.getElementById('timer');
  td.textContent=fmtTime(secsLeft);
  const ratio=secsLeft/totalSecs;
  td.className='timer-display'+(ratio<0.15?' danger':ratio<0.3?' warning':'');
  const pct=Math.round((secsLeft/totalSecs)*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress').style.background=ratio<0.15?'#e84a3a':ratio<0.3?'#e87c3a':'#c8a44a';
  const elapsed=totalSecs-secsLeft, em=Math.floor(elapsed/60), es=elapsed%60;
  document.getElementById('elapsed-info').textContent=em+':'+String(es).padStart(2,'0')+' écoulé';
  document.getElementById('duration-info').textContent='Durée : '+e.dur+' min';
  let ni=currentIdx+1;
  while(ni<s.length&&s[ni].isPause) ni++;
  if(ni<s.length) {
    const ne=s[ni];
    document.getElementById('next-blinds').textContent=fmt(ne.sb)+' / '+fmt(ne.bb);
    document.getElementById('next-dur').textContent=ne.dur+' min';
  } else {
    document.getElementById('next-blinds').textContent='—';
    document.getElementById('next-dur').textContent='—';
  }
  highlightCurrentRow();
}

function renderTable() {
  const s=getStruct(), tbody=document.getElementById('struct-body');
  tbody.innerHTML='';
  s.forEach((e,i)=>{
    const tr=document.createElement('tr');
    if(e.isPause) {
      tr.className='pause-row';
      if(editMode) {
        tr.innerHTML=`<td colspan="3" style="text-align:left;padding-left:8px;color:#c8843a;">— Pause —</td>
          <td><input class="dur-input" type="number" min="1" max="120" value="${e.dur}" onchange="updateDur(${i},this.value)" onclick="event.stopPropagation()"></td>`;
      } else {
        tr.innerHTML=`<td colspan="4" style="text-align:center;color:#c8843a;">— Pause ${e.dur} min —</td>`;
      }
    } else {
      if(i===currentIdx) tr.className='current-row';
      if(editMode) {
        tr.innerHTML=`<td>${e.level}</td><td>${fmt(e.sb)}</td><td>${fmt(e.bb)}</td>
          <td><input class="dur-input" type="number" min="1" max="120" value="${e.dur}" onchange="updateDur(${i},this.value)" onclick="event.stopPropagation()"></td>`;
      } else {
        tr.innerHTML=`<td>${e.level}</td><td>${fmt(e.sb)}</td><td>${fmt(e.bb)}</td><td>${e.dur}'</td>`;
      }
    }
    tr.style.cursor='pointer';
    tr.onclick=()=>{ if(!editMode){ if(isRunning) stopTimer(); loadLevel(i); } };
    tbody.appendChild(tr);
  });
  if(tbody.rows[currentIdx]) tbody.rows[currentIdx].scrollIntoView({block:'nearest'});
}

function highlightCurrentRow() {
  const rows=document.querySelectorAll('#struct-body tr');
  rows.forEach((r,i)=>{ if(!getEntry(i).isPause) r.className=i===currentIdx?'current-row':''; });
}

function updateDur(idx,val) {
  const v=Math.max(1,Math.min(120,parseInt(val)||1));
  STRUCTURES[tables][idx].dur=v;
  if(idx===currentIdx){ totalSecs=v*60; secsLeft=Math.min(secsLeft,totalSecs); }
  updateDisplay();
}

function toggleEdit() {
  editMode=!editMode;
  const btn=document.getElementById('edit-btn');
  document.getElementById('edit-panel').style.display=editMode?'block':'none';
  btn.classList.toggle('active',editMode);
  btn.textContent=editMode?'✔ Fermer édition':'✎ Modifier durées';
  renderTable();
}

function applyDur(mode) {
  if(mode==='all') {
    const v=Math.max(1,parseInt(document.getElementById('all-dur').value)||12);
    getStruct().forEach((_,i)=>{ if(!getStruct()[i].isPause) STRUCTURES[tables][i].dur=v; });
  } else if(mode==='pre') {
    const v=Math.max(1,parseInt(document.getElementById('pre-dur').value)||12);
    let p=false; getStruct().forEach((_,i)=>{ if(getStruct()[i].isPause){p=true;return;} if(!p) STRUCTURES[tables][i].dur=v; });
  } else {
    const v=Math.max(1,parseInt(document.getElementById('post-dur').value)||11);
    let p=false; getStruct().forEach((_,i)=>{ if(getStruct()[i].isPause){p=true;return;} if(p) STRUCTURES[tables][i].dur=v; });
  }
  if(!getEntry(currentIdx).isPause){ totalSecs=getEntry(currentIdx).dur*60; secsLeft=Math.min(secsLeft,totalSecs); }
  renderTable(); updateDisplay();
}

function togglePlay() { if(isRunning) stopTimer(); else startTimer(); }

function startTimer() {
  isRunning=true;
  document.getElementById('play-btn').textContent='⏸ Pause';
  document.getElementById('play-btn').classList.add('primary');
  intervalId=setInterval(()=>{
    secsLeft--;
    if(secsLeft<=0){
      secsLeft=0; updateDisplay(); stopTimer();
      setTimeout(()=>{ if(currentIdx+1<getStruct().length){ loadLevel(currentIdx+1); startTimer(); } },500);
    } else updateDisplay();
  },1000);
}

function stopTimer() {
  isRunning=false; clearInterval(intervalId);
  document.getElementById('play-btn').textContent='▶ Reprendre';
}

function nextLevel() { if(isRunning) stopTimer(); if(currentIdx+1<getStruct().length) loadLevel(currentIdx+1); }
function prevLevel() { if(isRunning) stopTimer(); if(currentIdx>0) loadLevel(currentIdx-1); }

function resetTimer() {
  if(isRunning) stopTimer();
  currentIdx=0; editMode=false;
  document.getElementById('play-btn').textContent='▶ Démarrer';
  document.getElementById('edit-panel').style.display='none';
  document.getElementById('edit-btn').classList.remove('active');
  document.getElementById('edit-btn').textContent='✎ Modifier durées';
  STRUCTURES=JSON.parse(JSON.stringify(BASE));
  loadLevel(0); renderTable();
}

renderTable(); loadLevel(0);
</script>
</body>
</html>
